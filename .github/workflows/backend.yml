name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: ""
      DEBUG: "True"
      OPEN_WEATHER_API_KEY: ""
      LOCATIONIQ_API_KEY: ""
      OPENAI_API_KEY: ""
      PINECONE_API_KEY: ""
      YOUTUBE_API_KEY: ""
      GOOGLE_MAPS_API_KEY: ""
      STADIA_MAPS_API_KEY: ""
      GROQ_API_KEY: ""
      DEEPSEEK_API_KEY: ""
      GITHUB_OPENAI__API_TOKEN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev

      - name: Django system check
        run: uv run python manage.py check

      - name: Run migrations
        run: uv run python manage.py migrate

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run tests with coverage
        run: uv run pytest --cov=weather --cov=core --cov-report=term-missing

  cd:
    name: Deploy to Render
    needs: ci
    runs-on: ubuntu-latest
    if: github.repository == 'mogesTesema/PM-Accelerator-Weather-App' && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set!"
            exit 1
          fi
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
