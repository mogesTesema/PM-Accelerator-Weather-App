services:
  - type: web
    name: pma-weather-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "pma-weather-app-ftol.onrender.com,.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://pma-weather-app-ftol.onrender.com,https://*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://pma-weather-app-ftol.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pma-weather-db
          property: connectionString
